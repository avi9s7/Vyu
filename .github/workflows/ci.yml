name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:0.8.0-pg17
        env:
          POSTGRES_DB: vyu
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d vyu"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install locked dependencies
        run: uv sync --all-groups --frozen
      - name: Run backend verification
        env:
          VYU_ADMIN_DATABASE_URL: postgresql+psycopg://test:test@127.0.0.1:5432/vyu
          VYU_MIGRATION_DATABASE_URL: postgresql+psycopg://vyu_migrator:local-migrator-password@127.0.0.1:5432/vyu
          VYU_DATABASE_URL: postgresql+psycopg://vyu_app:local-vyu-password@127.0.0.1:5432/vyu
        run: |
          uv run python scripts/verify.py --scope backend
          uv run python scripts/verify.py --scope integration

  frontend:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
