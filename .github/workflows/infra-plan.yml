name: Infra Plan

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-plan.yml"
      - "tests/infra/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: infra-plan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --all-groups --frozen

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt check
        run: terraform -chdir=infra/terraform/environments/dev fmt -check -recursive

      - name: Terraform init and validate
        run: |
          terraform -chdir=infra/terraform/environments/dev init -backend=false
          terraform -chdir=infra/terraform/environments/dev validate

      - name: Infra policy tests
        run: uv run pytest tests/infra -q

      - name: Python lint
        run: uv run ruff check src tests scripts

  plan:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: policy
    if: ${{ vars.AWS_PLAN_ROLE_ARN != '' }}
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ap-south-1
      TF_ENVIRONMENT: dev
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.9.8

      - name: Terraform plan
        working-directory: infra/terraform/environments/dev
        run: |
          if [ -f backend.hcl ]; then
            terraform init -backend-config=backend.hcl
          else
            terraform init -backend=false
          fi
          terraform plan -input=false -out=tfplan

      - name: Upload reviewed plan artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: terraform-plan-${{ github.sha }}
          path: infra/terraform/environments/dev/tfplan
          retention-days: 7
          if-no-files-found: error

      - name: Record plan metadata
        run: |
          printf '{"commit_sha":"%s","environment":"%s","workflow":"%s"}\n' \
            "${GITHUB_SHA}" "${TF_ENVIRONMENT}" "${GITHUB_WORKFLOW}" > plan-metadata.json

      - name: Upload plan metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: terraform-plan-metadata-${{ github.sha }}
          path: plan-metadata.json
          retention-days: 7
