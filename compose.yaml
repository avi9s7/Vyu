name: vyu

services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg17
    environment:
      POSTGRES_DB: vyu
      POSTGRES_USER: vyu_app
      POSTGRES_PASSWORD: local-vyu-password
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vyu_app -d vyu"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - vyu-postgres-data:/var/lib/postgresql/data
      - ./deploy/local/postgres/001_roles.sql:/docker-entrypoint-initdb.d/001_roles.sql:ro

volumes:
  vyu-postgres-data:
